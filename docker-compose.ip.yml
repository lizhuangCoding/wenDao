services:
  # 临时 IP 部署不需要 Caddy 自动 HTTPS。
  # 把 caddy 放进 domain profile 后，默认 up 不会启动它。
  caddy:
    profiles:
      - domain

  # 没有 Caddy 时，把服务器公网 8081 转发到前端容器内的 80。
  # 这样服务器的 80/443 可以留给后续统一网关或其他项目。
  frontend:
    ports:
      - "8081:80"

  # 阿里云服务器上 mysql:8.0 通常比 mysql:8.4 更容易拉取。
  mysql:
    image: mysql:8.0

  # IP 临时部署使用你已手动拉到服务器的 redis/redis-stack 镜像。
  redis:
    image: redis/redis-stack:latest
