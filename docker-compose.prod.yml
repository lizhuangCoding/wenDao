services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN to your public domain}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SERVER_PORT: "8089"
      SERVER_MODE: release
      SITE_URL: ${SITE_URL:?set SITE_URL to your public site URL}
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-wendao}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      DB_NAME: ${DB_NAME:-wendao}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      REDIS_VECTOR_HOST: redis
      REDIS_VECTOR_PORT: "6379"
      REDIS_VECTOR_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      UPLOAD_PATH: /app/uploads
      LOG_FORMAT: json
      LOG_OUTPUT: stdout
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      DOUBAO_ENDPOINT: ${DOUBAO_ENDPOINT:-}
      DOUBAO_CHAT_MODEL: ${DOUBAO_CHAT_MODEL:-}
      DOUBAO_EMBEDDING_MODEL: ${DOUBAO_EMBEDDING_MODEL:-}
      RESEARCH_ENDPOINT: ${RESEARCH_ENDPOINT:-}
      RESEARCH_API_KEY: ${RESEARCH_API_KEY:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8089/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_NAME:-wendao}
      MYSQL_USER: ${DB_USER:-wendao}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      REDIS_ARGS: "--appendonly yes --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
