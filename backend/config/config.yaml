# ---------------------------------------------------------
# wenDao 博客系统后端配置文件
# ---------------------------------------------------------

# 服务器基础配置
server:
  port: "8089"           # 服务启动端口
  mode: "debug"          # 运行模式: debug (开发/详细日志), release (生产/高性能)

# 网站信息配置
site:
  slogan: "我不在执着于得到，而是享受走到"  # 首页显示的网站标语
  url: ""                                  # 前端站点地址，建议通过环境变量 SITE_URL 注入

# MySQL 数据库配置
database:
  host: "localhost"      # 数据库连接地址
  port: "3306"           # 数据库端口
  user: ""               # 数据库用户名，建议通过环境变量 DB_USER 注入
  password: ""           # 数据库密码，建议通过环境变量 DB_PASSWORD 注入
  dbname: "wendao"       # 数据库名称
  max_idle_conns: 10     # 连接池最大空闲连接数
  max_open_conns: 100    # 连接池最大打开连接数

# 普通 Redis 配置 (用于缓存、限流、JWT 黑名单等)
redis:
  host: "localhost"      # Redis 连接地址
  port: "6379"           # Redis 端口
  password: ""           # Redis 密码 (没有则留空)
  db: 0                  # 使用的 Redis 数据库索引 (0-15)
  pool_size: 10          # Redis 连接池大小

# Redis Stack 配置 (用于 AI RAG 向量检索)
# 注意：如果使用 Redis Stack，通常与上面的 Redis 是同一个实例
redis_vector:
  host: "localhost"      # Redis Stack 连接地址
  port: "6379"           # Redis Stack 端口
  password: ""           # Redis Stack 密码
  db: 0                  # 向量数据库所在的 Redis 库索引
  pool_size: 5           # 向量检索专用的连接池大小

# JWT 身份认证配置
jwt:
  secret: "your-secret-key-change-in-production" # JWT 签名密钥，必须通过环境变量 JWT_SECRET 覆盖
  access_expire_hours: 1                         # 访问令牌 (Access Token) 过期时间 (小时)
  refresh_expire_days: 2                         # 刷新令牌 (Refresh Token) 过期时间 (天)

# AI / RAG (检索增强生成) 配置
ai:
  api_key: ""            # 火山引擎 Ark API Key (Doubao)
  endpoint: ""           # AI 接口请求地址，建议通过环境变量 DOUBAO_ENDPOINT 注入
  embedding_model: ""    # 向量化模型名称，建议通过环境变量 DOUBAO_EMBEDDING_MODEL 注入
  llm_model: ""          # 对话大语言模型名称，建议通过环境变量 DOUBAO_CHAT_MODEL 注入
  temperature: 0.7       # 模型发散度 (0.0-1.0)，越高越随机，越低越严谨
  max_tokens: 500        # AI 单次回答的最大 Token 数量
  top_k: 3               # RAG 检索时，从向量库中提取的相关文章片段数量
  rag_min_score: 0.30    # RAG 检索的最小相似度分数阈值 (0.0-1.0)，低于此分数的片段将被忽略
  research_endpoint: ""  # 多 Agent Journalist 调研服务地址，建议通过环境变量 RESEARCH_ENDPOINT 注入
  research_api_key: ""   # 多 Agent Journalist 调研服务鉴权 Key，建议通过环境变量 RESEARCH_API_KEY 注入
  research_max_results: 5 # 单次联网调研最多拉取的来源数量
  research_timeout_seconds: 15 # 单次联网调研请求超时时间（秒）

# OAuth 第三方登录配置
oauth:
  github:
    client_id: ""        # GitHub OAuth App 的 Client ID，建议通过环境变量 GITHUB_CLIENT_ID 注入
    client_secret: ""    # GitHub OAuth App 的 Client Secret，建议通过环境变量 GITHUB_CLIENT_SECRET 注入
    callback_url: ""     # GitHub 登录后的回调地址，建议通过环境变量 GITHUB_CALLBACK_URL 注入

# 文件上传配置
upload:
  max_size: 10485760     # 单个文件上传限制大小 (字节)，当前为 10MB
  allowed_types:         # 允许上传的文件 MIME 类型列表
    - "image/jpeg"
    - "image/png"
    - "image/gif"
    - "image/webp"
  storage_path: "./uploads" # 文件在服务器上的物理存储路径
  enable_image_compression: true # 是否开启图片自动压缩优化
  image_quality: 80      # 压缩后的图片质量 (1-100)，仅针对 JPEG
  max_image_width: 2560  # 允许的最大图片宽度，超过则等比例缩放
  max_image_height: 2560 # 允许的最大图片高度，超过则等比例缩放

# 访问限流配置 (单位时间内允许的最大请求次数)
ratelimit:
  global: 100            # 全局 API 限流 (每秒)
  register: 5            # 注册接口限流 (每分钟)
  login: 10              # 登录接口限流 (每分钟)
  ai_chat: 10            # AI 对话接口限流 (每分钟)

# 日志配置
log:
  level: "info"          # 日志级别: debug, info, warn, error
  format: "console"      # 日志格式: json (生产环境推荐), console (控制台友好)
  output: "log/"         # 日志输出目录，文件名会自动生成为 YYYY-MM-DD.log
